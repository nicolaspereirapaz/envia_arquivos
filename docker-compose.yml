services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: farefoto
      POSTGRES_USER: farefoto
      POSTGRES_PASSWORD: farefoto
    ports:
      - "5432:5432"
    volumes:
      - farefoto_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farefoto -d farefoto"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://farefoto:farefoto@postgres:5432/farefoto
      FARE_FOTO_STORE_PERSIST: "true"
      FARE_FOTO_STORE_PATH: /app/tmp/fare-foto-store.json
    ports:
      - "3000:3000"
    volumes:
      - farefoto_uploads:/app/uploads
      - farefoto_tmp:/app/tmp
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://api:3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:3000
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://api:3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:3000
    ports:
      - "3002:3002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3002').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  farefoto_postgres:
  farefoto_uploads:
  farefoto_tmp:
